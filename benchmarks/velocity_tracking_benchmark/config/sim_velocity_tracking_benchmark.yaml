/**:
  ros__parameters:
    use_sim_clock: true
    sim_clock_topic: /acesim/clock
    publish_rate_hz: 50.0
    measurement_source: odometry_pose
    measured_odometry_topic: /acesim/vehicle/odometry
    vehicle_position_source: odometry_pose
    vehicle_odometry_topic: /acesim/vehicle/odometry
    velocity_frame_id: world
    offboard_control_mode_topic: /fmu/in/offboard_control_mode
    trajectory_setpoint_topic: /fmu/in/trajectory_setpoint
    command_velocity_topic: /velocity_tracking_benchmark/command_velocity
    measured_velocity_topic: /velocity_tracking_benchmark/measured_velocity
    velocity_error_topic: /velocity_tracking_benchmark/velocity_error
    status_topic: /velocity_tracking_benchmark/status

    profile.durations_s: [2.0, 2.0, 2.0, 2.0]
    profile.vx_m_s: [0.25, 0.0, -0.25, 0.0]
    profile.vy_m_s: [0.0, 0.25, 0.0, -0.25]
    profile.vz_m_s: [0.0, 0.0, 0.0, 0.0]
    profile.yaw_rate_rad_s: [0.0, 0.0, 0.0, 0.0]
    profile.loop: false
    profile.max_linear_speed_m_s: 1.0
    profile.max_yaw_rate_rad_s: 0.5

    velocity_estimator.min_dt_s: 0.002
    velocity_estimator.max_dt_s: 0.5
    velocity_estimator.low_pass_alpha: 0.5
